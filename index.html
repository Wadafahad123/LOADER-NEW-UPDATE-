<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Loader 3D Update</title>
    <style>
        /* جگمگاتا ہوا متحرک پس منظر */
        body {
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #ffcc00, #000000);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 3D کارڈ لائٹنگ ایفیکٹ کے ساتھ */
        .container {
            text-align: center;
            padding: 50px 30px;
            border: 2px solid rgba(255, 204, 0, 0.5);
            border-radius: 30px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.3), inset 0 0 20px rgba(255, 204, 0, 0.2);
            max-width: 400px;
            width: 90%;
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(5deg); }
            50% { transform: translateY(-15px) rotateX(-5deg); }
        }

        /* چمکتی ہوئی ہیڈنگ */
        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff6600;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ffcc00; }
            to { text-shadow: 0 0 25px #ffcc00, 0 0 40px #ff6600; }
        }

        /* 3D ڈاؤن لوڈ بٹن لائٹنگ کے ساتھ */
        .download-btn {
            display: inline-block;
            background: linear-gradient(145deg, #ffcc00, #cca300);
            color: #000;
            padding: 22px 60px;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 15px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0 #997a00, 0 15px 25px rgba(255, 204, 0, 0.4);
            position: relative;
        }

        .download-btn:hover {
            transform: translateY(3px) scale(1.05);
            box-shadow: 0 5px 0 #997a00, 0 10px 35px rgba(255, 204, 0, 0.6);
            background: #ffffff;
        }

        .download-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #997a00;
        }

        .update-text {
            margin-top: 25px;
            font-size: 14px;
            color: #ffcc00;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TIGER LOADER<br>3D UPDATE</h1>
        
        <a href="https://t.me/tigerloaderss" target="_blank" class="download-btn">
            DOWNLOAD NOW
        </a>

        <p class="update-text">⚡ Premium & High Speed ⚡</p>
    </div>

</body>
</html>
